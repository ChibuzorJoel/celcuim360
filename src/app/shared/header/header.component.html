<div class="container-fluid sticky-top px-0">
  <div class="position-absolute" style="left: 0; top: 0; width: 100%; height: 100%;"></div>
  <div class="container px-0">
    <nav class="navbar navbar-expand-lg navbar-dark bg-white py-3 px-4">

      <a routerLink="/" class="navbar-brand d-flex align-items-center p-0">
        <img src="../../../assets/img/celcium360logo.png" alt="Celcium360 Logo" class="navbar-logo">
      </a>

      <button class="navbar-toggler" type="button" (click)="toggleMobileMenu()" aria-label="Toggle navigation">
        <span class="fa fa-bars"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav ms-auto py-0">
          <a routerLink="/home"         class="nav-item nav-link" (click)="closeMobileMenu()">Home</a>
          <a routerLink="/about"        class="nav-item nav-link" (click)="closeMobileMenu()">About</a>
          <a routerLink="/services"     class="nav-item nav-link" (click)="closeMobileMenu()">Services</a>
          <a routerLink="/worksmart"    class="nav-item nav-link" (click)="closeMobileMenu()">WorkSmart360</a>
          <a routerLink="/program"      class="nav-item nav-link" (click)="closeMobileMenu()">Work Readiness</a>
          <a routerLink="/training"     class="nav-item nav-link" (click)="closeMobileMenu()">Training &amp; Courses</a>
          <a routerLink="/contact"      class="nav-item nav-link" (click)="closeMobileMenu()">Contact Us</a>
        </div>

        <div class="d-flex align-items-center gap-2 ms-3 flex-wrap">

          <!-- ── Book a Consultation button ── -->
          <a routerLink="/consultation"
            class="btn btn-account rounded-pill py-2 px-4 d-flex align-items-center gap-2"
            (click)="closeMobileMenu()">
            Book a Consultation
          </a>

          <!-- ── Account Dropdown ── -->
          <div class="dropdown account-dropdown">
            <button
              class="btn btn-account rounded-pill py-2 px-4 d-flex align-items-center gap-2"
              type="button"
              (click)="toggleAccountMenu($event)"
              [attr.aria-expanded]="accountMenuOpen">
              <!-- Person icon -->
              <svg viewBox="0 0 24 24" fill="none" width="16" height="16" class="account-icon">
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="12" cy="7" r="4"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Account
              <!-- Chevron -->
              <svg viewBox="0 0 24 24" fill="none" width="13" height="13"
                   class="chevron-icon" [class.rotated]="accountMenuOpen">
                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>

            <!-- Dropdown menu -->
            <div class="account-menu" [class.open]="accountMenuOpen">

              <div class="account-menu-header">
                <span>Welcome</span>
              </div>

              <a routerLink="/registration"
                 class="account-menu-item"
                 (click)="closeMobileMenu(); closeAccountMenu()">
                <span class="menu-item-icon">
                  <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
                    <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"
                          stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
                    <line x1="19" y1="8" x2="19" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="22" y1="11" x2="16" y2="11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </span>
                <div class="menu-item-body">
                  <span class="menu-item-label">Register</span>
                  <span class="menu-item-sub">New student? Create your account</span>
                </div>
              </a>

              <div class="account-menu-divider"></div>

              <a routerLink="/student-login"
                 class="account-menu-item"
                 (click)="closeMobileMenu(); closeAccountMenu()">
                <span class="menu-item-icon">
                  <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
                    <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"
                          stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <polyline points="10 17 15 12 10 7"
                              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                    <line x1="15" y1="12" x2="3" y2="12"
                          stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </span>
                <div class="menu-item-body">
                  <span class="menu-item-label">Login</span>
                  <span class="menu-item-sub">Already registered? Sign in</span>
                </div>
              </a>

            </div><!-- /account-menu -->
          </div><!-- /dropdown -->

        </div><!-- /d-flex -->
      </div><!-- /navbar-collapse -->
    </nav>
  </div>
</div>

<!-- Modal Search -->
<div class="modal fade" id="searchModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-fullscreen">
    <div class="modal-content rounded-0">
      <div class="modal-header">
        <h4 class="modal-title mb-0" id="exampleModalLabel">Search by keyword.</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body d-flex align-items-center">
        <div class="input-group w-75 mx-auto d-flex">
          <input type="search" class="form-control p-3" placeholder="keywords" aria-describedby="search-icon-1">
          <span id="search-icon-1" class="input-group-text p-3"><i class="fa fa-search"></i></span>
        </div>
      </div>
    </div>
  </div>
</div>
