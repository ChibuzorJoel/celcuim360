<div class="shell-wrap">

    <!-- ── Sidebar ───────────────────────────────────────────────────────────── -->
    <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
  
      <!-- Brand -->
      <div class="sidebar-brand">
        <div class="brand-icon">C3</div>
        <div class="brand-text" *ngIf="!sidebarCollapsed">
          <span class="brand-name">celcium<span>360</span></span>
          <span class="brand-sub">Admin Panel</span>
        </div>
      </div>
  
      <!-- Toggle -->
      <button class="sidebar-toggle" (click)="toggleSidebar()" [title]="sidebarCollapsed ? 'Expand' : 'Collapse'">
        <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
          <path [attr.d]="sidebarCollapsed ? 'M9 18l6-6-6-6' : 'M15 18l-6-6 6-6'"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
  
      <!-- Nav -->
      <nav class="sidebar-nav">
  
        <div class="nav-section">
          <div class="nav-section-label" *ngIf="!sidebarCollapsed">Main</div>
  
          <a class="nav-item" routerLink="/admin/dashboard" routerLinkActive="active" title="Dashboard">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <rect x="3" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
              <rect x="3" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
              <rect x="14" y="14" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <span *ngIf="!sidebarCollapsed">Dashboard</span>
          </a>
  
          <a class="nav-item" routerLink="/admin/registration" routerLinkActive="active" title="Registration">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
              <path d="M16 11l2 2 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span *ngIf="!sidebarCollapsed">Registration</span>
            <span class="nav-badge red" *ngIf="!sidebarCollapsed && pendingCount > 0">{{ pendingCount }}</span>
          </a>
  
          <a class="nav-item" routerLink="/admin/contact" routerLinkActive="active" title="Contact">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span *ngIf="!sidebarCollapsed">Contact</span>
            <span class="nav-badge" *ngIf="!sidebarCollapsed && unreadCount > 0">{{ unreadCount }}</span>
          </a>
  
          <a class="nav-item" routerLink="/admin/assessment" routerLinkActive="active" title="Assessment">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <path d="M9 11l3 3L22 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span *ngIf="!sidebarCollapsed">Assessment</span>
          </a>
        </div>
  
        <div class="nav-section">
          <div class="nav-section-label" *ngIf="!sidebarCollapsed">Manage</div>
  
          <a class="nav-item" routerLink="/admin/cohorts" routerLinkActive="active" title="Cohorts">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span *ngIf="!sidebarCollapsed">Cohorts</span>
          </a>
  
          <a class="nav-item" routerLink="/admin/analytics" routerLinkActive="active" title="Analytics">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <line x1="18" y1="20" x2="18" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="12" y1="20" x2="12" y2="4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="6" y1="20" x2="6" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span *ngIf="!sidebarCollapsed">Analytics</span>
          </a>
  
          <a class="nav-item" routerLink="/admin/payments" routerLinkActive="active" title="Payments">
            <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
              <rect x="1" y="4" width="22" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/>
              <line x1="1" y1="10" x2="23" y2="10" stroke="currentColor" stroke-width="1.8"/>
            </svg>
            <span *ngIf="!sidebarCollapsed">Payments</span>
            <span class="nav-badge" *ngIf="!sidebarCollapsed && unverifiedPayments > 0">{{ unverifiedPayments }}</span>
          </a>
        </div>
      </nav>
  
      <!-- Footer / User -->
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar">SA</div>
          <div class="user-info" *ngIf="!sidebarCollapsed">
            <div class="user-name">Super Admin</div>
            <div class="user-role">Administrator</div>
          </div>
          <button class="logout-btn" (click)="logout()" title="Logout" *ngIf="!sidebarCollapsed">
            <svg viewBox="0 0 24 24" fill="none" width="15" height="15">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>
  
    <!-- ── Main area ──────────────────────────────────────────────────────────── -->
    <div class="main-area">
  
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <span class="topbar-title">{{ pageTitle }}</span>
          <span class="topbar-breadcrumb">celcium360 / {{ pageTitle }}</span>
        </div>
        <div class="topbar-right">
          <div class="live-indicator">
            <span class="live-dot"></span>
            Live
          </div>
          <div class="topbar-search">
            <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
              <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
              <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input type="text" placeholder="Search records..." [(ngModel)]="globalSearch" (input)="onGlobalSearch()"/>
          </div>
          <button class="topbar-notif" title="Notifications">
            <svg viewBox="0 0 24 24" fill="none" width="17" height="17">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <span class="notif-dot" *ngIf="pendingCount > 0"></span>
          </button>
        </div>
      </header>
  
      <!-- Router outlet -->
      <div class="page-content">
        <router-outlet></router-outlet>
      </div>
  
    </div>
  </div>
